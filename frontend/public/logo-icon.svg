<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .bg { fill: #5B5BD6; }
      .shape { fill: none; stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #ffffff; }
      .inner { fill: rgba(255,255,255,0.15); stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Square background with rounded corners -->
  <rect width="100" height="100" rx="22" class="bg"/>

  <!-- Outer shield / Gye Nyame inspired upward form -->
  <!-- Crown-like top arc -->
  <path d="M50 18 C36 18 24 26 24 40 C24 52 32 60 42 64 L36 82 L50 74 L64 82 L58 64 C68 60 76 52 76 40 C76 26 64 18 50 18 Z" class="shape" stroke-width="2.2"/>

  <!-- Inner lens / knowledge core (Nyansapo inner knot) -->
  <ellipse cx="50" cy="40" rx="11" ry="11" class="inner" stroke-width="1.5"/>

  <!-- Central bright dot — the AI insight / chosen one -->
  <circle cx="50" cy="40" r="4.5" class="dot"/>

  <!-- Three descending rank marks below shield base — the leaderboard -->
  <line x1="44" y1="70" x2="56" y2="70" class="shape" stroke-width="1.8" opacity="0.9"/>
  <line x1="46" y1="75" x2="54" y2="75" class="shape" stroke-width="1.8" opacity="0.6"/>
  <line x1="48" y1="80" x2="52" y2="80" class="shape" stroke-width="1.8" opacity="0.35"/>
</svg>
