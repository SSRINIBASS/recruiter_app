<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <style>
      .bg-dark { fill: #1a1a2e; }
      .card { fill: #5B5BD6; }
      .shape { fill: none; stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #ffffff; }
      .inner { fill: rgba(255,255,255,0.15); stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
      .wordmark-light { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; fill: #ffffff; letter-spacing: 0.04em; }
      .tagline-light { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #9090b0; letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="280" height="80" rx="12" class="bg-dark"/>

  <!-- Icon background -->
  <rect x="12" y="8" width="64" height="64" rx="14" class="card"/>

  <!-- Shield form -->
  <path d="M44 18 C36 18 30 24 30 32 C30 40 35 46 41 49 L37 60 L44 56 L51 60 L47 49 C53 46 58 40 58 32 C58 24 52 18 44 18 Z" class="shape" stroke-width="1.8"/>

  <!-- Inner ellipse -->
  <ellipse cx="44" cy="32" rx="7.5" ry="7.5" class="inner" stroke-width="1.3"/>

  <!-- Center dot -->
  <circle cx="44" cy="32" r="3" class="dot"/>

  <!-- Rank lines -->
  <line x1="39" y1="53" x2="49" y2="53" class="shape" stroke-width="1.5" opacity="0.9"/>
  <line x1="40.5" y1="57" x2="47.5" y2="57" class="shape" stroke-width="1.5" opacity="0.6"/>
  <line x1="42" y1="61" x2="46" y2="61" class="shape" stroke-width="1.5" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="94" y="48" font-size="36" class="wordmark-light">eligo</text>

  <!-- Tagline -->
  <text x="95" y="64" font-size="10" class="tagline-light">AI RECRUITER</text>
</svg>
