<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <style>
      .bg { fill: #5B5BD6; }
      .shape { fill: none; stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #ffffff; }
      .inner { fill: rgba(255,255,255,0.15); stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; }
      .wordmark { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; fill: #1a1a2e; letter-spacing: 0.04em; }
      .tagline { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #888780; letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="8" width="64" height="64" rx="14" class="bg"/>

  <!-- Shield form -->
  <path d="M32 18 C24 18 18 24 18 32 C18 40 23 46 29 49 L25 60 L32 56 L39 60 L35 49 C41 46 46 40 46 32 C46 24 40 18 32 18 Z" class="shape" stroke-width="1.8"/>

  <!-- Inner ellipse -->
  <ellipse cx="32" cy="32" rx="7.5" ry="7.5" class="inner" stroke-width="1.3"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" class="dot"/>

  <!-- Rank lines -->
  <line x1="27" y1="53" x2="37" y2="53" class="shape" stroke-width="1.5" opacity="0.9"/>
  <line x1="28.5" y1="57" x2="35.5" y2="57" class="shape" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="61" x2="34" y2="61" class="shape" stroke-width="1.5" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="82" y="48" font-size="36" class="wordmark">eligo</text>

  <!-- Tagline -->
  <text x="83" y="64" font-size="10" class="tagline">AI RECRUITER</text>
</svg>
